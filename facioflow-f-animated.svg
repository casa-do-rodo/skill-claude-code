<?xml version="1.0" encoding="UTF-8"?>
<!--
  FacioFlow F — Animated SVG (standalone, reutilizável)

  Composição:
   • F base sólido em azul-cyan (rgba 125,180,255,0.7)
   • B — F glowing from within: 3 ondas pulsantes emergindo do V-point,
     top arm terminal e middle arm terminal, clipadas ao formato exato do F
   • A — Animação orbital: 2 anéis tracejados girando em sentidos opostos
     (outer 22s horário · inner 14s anti-horário) + 4 dots viajando neles

  Tudo self-contained: keyframes inline via <style>, sem dependências externas.
  Recomendado em fundo escuro (idealmente #070A13 ou similar).
  Ajuste width/height conforme necessário — proporção é 600:620.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="700 720 600 620" width="340" height="350"
     fill="none">
  <style>
    @keyframes facioflow-spin     { to { transform: rotate(360deg);  } }
    @keyframes facioflow-spin-rev { to { transform: rotate(-360deg); } }
    .ff-ring-outer {
      transform-origin: 1024px 1030px;
      transform-box: view-box;
      animation: facioflow-spin 22s linear infinite;
    }
    .ff-ring-inner {
      transform-origin: 1024px 1030px;
      transform-box: view-box;
      animation: facioflow-spin-rev 14s linear infinite;
    }
  </style>

  <defs>
    <!-- F path definitions (referenciados por <use>) -->
    <path id="ffPathMain" d="M879.558 1154.17C877.769 1162.72 874.925 1170.66 874.014 1179.01C875.754 1179.71 876.66 1178.76 877.57 1178.12C885.019 1172.83 892.406 1167.44 899.892 1162.22C901.965 1160.77 902.998 1159 903.627 1156.4C910.205 1129.25 915.261 1101.61 923.617 1075.03C933.368 1044.01 954.794 1027.3 984.493 1022.26C986.365 1021.95 988.313 1022.1 990.226 1022.1C1028.25 1022.1 1066.27 1022.08 1104.3 1022.17C1107.76 1022.18 1110.13 1021.33 1112.26 1018.01C1118.2 1008.75 1130.87 1004.82 1141.85 1008.27C1152.46 1011.6 1160.55 1021.93 1161.32 1033.15C1162.58 1051.33 1152.99 1064.4 1136.19 1066.42C1126.9 1067.54 1118.83 1063.77 1112.73 1056.11C1110.73 1053.6 1108.72 1052.84 1105.85 1052.85C1069.1 1052.97 1032.35 1053 995.606 1053.07C973.94 1053.11 957.061 1066.55 950.893 1088.84C947.335 1101.7 944.008 1114.63 940.575 1127.53C940.195 1128.96 939.536 1130.37 940.382 1131.83C941.583 1132.62 942.314 1131.65 943.132 1131.07C953.577 1123.7 964 1116.28 974.481 1108.97C976.308 1107.69 977.269 1106.04 978.063 1103.9C983.461 1089.35 999.332 1084.54 1010.48 1094.28C1016.29 1099.35 1018 1106.54 1016.82 1114.28C1015.54 1122.63 1011.39 1129.09 1003.44 1130.96C998.333 1132.15 994.288 1134.89 990.199 1137.85C972.328 1150.79 954.517 1163.82 936.642 1176.75C914.315 1192.9 892.065 1209.18 869.566 1225.05C838.968 1246.63 809.267 1269.66 778.19 1290.47C774.829 1292.72 771.375 1294.84 767.449 1295.73C762.112 1296.93 759.287 1294.09 760.155 1288.28C761.997 1275.96 765.356 1264.01 768.216 1251.95C776.01 1219.06 783.978 1186.22 791.742 1153.32C799.882 1118.83 808.198 1084.38 815.79 1049.75C820.395 1028.74 827.142 1008.83 837.715 990.496C853.347 963.389 874.618 942.861 900.955 928.251C924.331 915.285 949.286 909.475 975.42 909.431C1042.03 909.319 1108.63 909.481 1175.24 909.408C1205.62 909.375 1230.2 887.731 1236.53 855.819C1237.65 850.198 1238.75 844.57 1240.04 838.993C1240.5 837.005 1240.23 835.519 1238.83 834.208C1238.45 833.849 1237.95 833.501 1237.77 833.032C1235.21 826.252 1229.9 826.744 1224.44 826.75C1142.14 826.847 1059.84 826.881 977.536 826.819C952.68 826.801 930.299 834.566 910.649 850.908C897.513 861.833 888.636 876.184 882.455 892.674C878.72 902.639 875.888 912.824 874.234 923.392C873.935 925.307 873.221 926.699 871.762 927.778C859.107 937.13 847.335 947.575 837.215 960.064C836.912 960.438 836.429 960.643 836.103 960.876C834.964 960.251 835.335 959.322 835.481 958.605C841.331 929.823 847.653 901.108 858.012 873.794C868.839 845.246 888.267 824.766 913.594 810.583C934.035 799.136 955.768 794.17 978.796 794.224C1062.37 794.42 1145.95 794.281 1229.52 794.393C1233.62 794.399 1236.54 793.22 1239.64 790.157C1248.45 781.441 1258.92 779.941 1269.9 784.555C1280.57 789.038 1285.92 798.078 1286.87 810.158C1287.82 822.165 1283.47 831.607 1274.11 838.137C1271.01 840.306 1269.77 843.052 1269.12 846.763C1266.04 864.616 1261.98 882.102 1252.3 897.472C1236.62 922.361 1215.1 936.613 1187.14 939.608C1179.49 940.427 1171.86 940.314 1164.21 940.32C1100.79 940.366 1037.37 939.76 973.966 940.59C930.16 941.163 894.779 961.225 868.716 999.283C857.377 1015.84 850.639 1034.66 846.389 1054.7C841.886 1075.93 836.738 1097 831.754 1118.1C823.546 1152.86 815.241 1187.59 806.99 1222.34C806.619 1223.9 806.388 1225.5 806.115 1226.96C807.922 1228.46 809.022 1227.16 810.117 1226.39C817.904 1220.9 825.652 1215.36 833.441 1209.88C835.026 1208.76 835.954 1207.34 836.422 1205.34C843.198 1176.41 850.019 1147.49 856.842 1118.58C862.571 1094.3 867.465 1069.76 874.372 1045.84C882.562 1017.48 898.906 995.723 922.968 980.704C937.537 971.611 953.288 967.46 969.895 966.115C990.683 964.433 1011.46 966.663 1032.24 966.2C1034.85 966.142 1037.13 965.667 1039.46 964.197C1046.83 959.548 1055.41 960.865 1061.23 967.205C1066.89 973.36 1068.11 983.396 1064.1 990.766C1059.88 998.526 1051.24 1002.86 1043.43 999.41C1035.86 996.071 1028.3 996.177 1020.58 996.326C1004.26 996.642 987.923 995.698 971.609 996.987C946.215 998.993 926.64 1011.61 912.442 1034.14C904.854 1046.18 901.599 1059.97 898.414 1073.84C892.678 1098.82 886.673 1123.72 880.784 1148.66C880.377 1150.38 880.004 1152.11 879.558 1154.17Z"/>
    <path id="ffPathDetail" d="M938.03 896.48C925.867 897.285 915.082 902.179 903.48 907.259C904.717 901.087 907.052 896.548 909.466 892.182C922.281 869.008 942.024 857.058 966.135 852.408C967.875 852.073 969.692 852.126 971.474 852.124C1014.35 852.124 1057.22 852.031 1100.09 852.065C1103.75 852.068 1107.04 851.368 1110.33 849.5C1118.33 844.961 1127.32 846.895 1132.85 853.983C1138.32 861.004 1138.9 872.262 1134.14 879.277C1128.91 886.989 1119.82 890.022 1111.7 886.136C1107.12 883.943 1102.57 883.234 1097.64 883.256C1054.77 883.449 1011.9 883.453 969.025 883.66C960.075 883.704 951.846 886.261 945.825 894.062C943.768 896.726 940.835 895.593 938.03 896.48Z"/>

    <!-- Clip-path: confina os pulses ao formato exato do F -->
    <clipPath id="ffClip">
      <use href="#ffPathMain"/>
      <use href="#ffPathDetail"/>
    </clipPath>

    <!-- Glow filter para os dots orbitais -->
    <filter id="ffGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <!-- Orbit paths para os pontos orbitais (motion paths) -->
    <path id="ffOrbitOuter" fill="none"
      d="M 744,1030 A 280,280 0 1,1 1304,1030 A 280,280 0 1,1 744,1030"/>
    <path id="ffOrbitInner" fill="none"
      d="M 799,1030 A 225,225 0 1,0 1249,1030 A 225,225 0 1,0 799,1030"/>

    <!-- Ring fade mask (visível nos lados, fade no topo/base) -->
    <linearGradient id="ffRingFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="22%"  stop-color="white" stop-opacity="1"/>
      <stop offset="78%"  stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="ffRingMask"><rect x="600" y="620" width="800" height="800" fill="url(#ffRingFade)"/></mask>
  </defs>

  <!-- Outer dashed orbit ring (lento, horário, 22s) -->
  <g mask="url(#ffRingMask)">
    <g class="ff-ring-outer">
      <circle cx="1024" cy="1030" r="280"
        fill="none" stroke="rgba(36,99,235,0.32)" stroke-width="2.5"
        stroke-dasharray="22 16"/>
    </g>
  </g>

  <!-- Inner orbit ring (rápido, anti-horário, 14s) -->
  <g mask="url(#ffRingMask)">
    <g class="ff-ring-inner">
      <circle cx="1024" cy="1030" r="225"
        fill="none" stroke="rgba(36,99,235,0.22)" stroke-width="1.5"
        stroke-dasharray="6 12"/>
    </g>
  </g>

  <!-- F base sólido (sempre visível, azul-cyan) -->
  <g fill="rgba(125,180,255,0.7)">
    <use href="#ffPathMain"/>
    <use href="#ffPathDetail"/>
  </g>

  <!-- B: F glowing from within - 3 ondas pulsantes saem dos terminals -->
  <g clip-path="url(#ffClip)">
    <!-- Onda 1: emerge do V-point -->
    <circle cx="790" cy="1280" r="20" fill="none" stroke="#9DDBFF" stroke-width="34">
      <animate attributeName="r" from="10" to="380" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.65;0.3;0" keyTimes="0;0.2;0.7;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" from="36" to="4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Onda 2: emerge do top arm terminal -->
    <circle cx="1255" cy="830" r="20" fill="none" stroke="#9DDBFF" stroke-width="34" opacity="0">
      <animate attributeName="r" from="10" to="380" dur="4s" begin="-1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.65;0.3;0" keyTimes="0;0.2;0.7;1" dur="4s" begin="-1.3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" from="36" to="4" dur="4s" begin="-1.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Onda 3: emerge do middle arm terminal -->
    <circle cx="1190" cy="1090" r="20" fill="none" stroke="#9DDBFF" stroke-width="34" opacity="0">
      <animate attributeName="r" from="10" to="380" dur="4s" begin="-2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.65;0.3;0" keyTimes="0;0.2;0.7;1" dur="4s" begin="-2.7s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" from="36" to="4" dur="4s" begin="-2.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- A: Orbital dots viajando ao redor do F nos 2 anéis -->
  <g filter="url(#ffGlow)">
    <!-- Outer ring: 2 dots em posições opostas (horário, 14s) -->
    <circle cx="0" cy="0" r="6" fill="#9DDBFF">
      <animateMotion dur="14s" repeatCount="indefinite" rotate="0">
        <mpath href="#ffOrbitOuter"/>
      </animateMotion>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#9DDBFF" opacity="0.7">
      <animateMotion dur="14s" begin="-7s" repeatCount="indefinite" rotate="0">
        <mpath href="#ffOrbitOuter"/>
      </animateMotion>
    </circle>
    <!-- Inner ring: 2 dots opostos (anti-horário, 9s) -->
    <circle cx="0" cy="0" r="5" fill="#9DDBFF">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="0">
        <mpath href="#ffOrbitInner"/>
      </animateMotion>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#9DDBFF" opacity="0.6">
      <animateMotion dur="9s" begin="-4.5s" repeatCount="indefinite" rotate="0">
        <mpath href="#ffOrbitInner"/>
      </animateMotion>
    </circle>
  </g>
</svg>
