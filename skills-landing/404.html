<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página não encontrada</title>
  <meta name="description" content="A página que você procura saiu do circuito. Volte ao início ou explore o repositório no GitHub.">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#070A13">
  <link rel="icon" type="image/svg+xml" href="../facioflow-f-animated.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <style>
    .error-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-6);
      text-align: center;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 35%, rgba(36, 99, 235, 0.10) 0%, transparent 60%), var(--bg);
    }

    .error-content {
      position: relative;
      z-index: 2;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      animation: reveal-up 0.7s ease both;
    }

    .error-eyebrow {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: var(--space-2);
    }

    .error-headline {
      font-family: var(--font-display);
      font-size: clamp(36px, 6vw, 68px);
      font-weight: 900;
      line-height: 1.04;
      text-wrap: balance;
      color: var(--text);
      margin: 0;
    }

    .error-headline .accent-period {
      color: var(--accent);
    }

    .error-sub {
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 460px;
      text-wrap: balance;
      margin: var(--space-2) 0 var(--space-6);
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-4);
    }

    /* Decorative SVG — vertical dashed circuit */
    .error-deco {
      position: absolute;
      top: 0;
      right: clamp(16px, 6vw, 80px);
      height: 100%;
      width: 80px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.7;
    }

    .error-deco-left {
      right: auto;
      left: clamp(16px, 6vw, 80px);
      opacity: 0.35;
    }

    @media (max-width: 640px) {
      .error-deco-left { display: none; }
      .error-deco { right: 12px; opacity: 0.5; }
      .error-actions { gap: var(--space-3); }
      .error-actions .btn { padding: 12px 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .error-content { animation: none; }
      .error-deco animate,
      .error-deco animateMotion { display: none; }
    }
  </style>
</head>
<body>

  <a href="#main" class="skip-link">Pular para o conteúdo</a>

  <main id="main" class="error-page">

    <!-- Decorative circuit lines: dashed vertical with pulsing dots in cyan -->
    <svg class="error-deco error-deco-left" viewBox="0 0 80 800" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="40" y1="0" x2="40" y2="800"
            stroke="#9DDBFF" stroke-width="1" stroke-dasharray="4 8" stroke-opacity="0.25"/>
      <circle cx="40" cy="200" r="3" fill="#9DDBFF" opacity="0.6">
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2.5;4;2.5" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="560" r="2.5" fill="#9DDBFF" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.6s" begin="0.6s" repeatCount="indefinite"/>
      </circle>
    </svg>

    <svg class="error-deco" viewBox="0 0 80 800" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="40" y1="0" x2="40" y2="800"
            stroke="#9DDBFF" stroke-width="1" stroke-dasharray="4 8" stroke-opacity="0.35"/>
      <line x1="20" y1="120" x2="60" y2="120"
            stroke="#9DDBFF" stroke-width="1" stroke-opacity="0.18"/>
      <line x1="20" y1="640" x2="60" y2="640"
            stroke="#9DDBFF" stroke-width="1" stroke-opacity="0.18"/>
      <!-- Pulsing dot traveling down the line -->
      <circle r="3.5" fill="#9DDBFF">
        <animate attributeName="opacity" values="0;1;1;0" dur="4.2s" repeatCount="indefinite"/>
        <animateMotion dur="4.2s" repeatCount="indefinite"
                       path="M 40 0 L 40 800"/>
      </circle>
      <!-- Static glow dots -->
      <circle cx="40" cy="320" r="3" fill="#9DDBFF" opacity="0.7">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2.5;4.5;2.5" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="480" r="2.5" fill="#2463EB" opacity="0.7">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" begin="1s" repeatCount="indefinite"/>
      </circle>
    </svg>

    <div class="error-content">
      <span class="error-eyebrow">Error · 404</span>
      <h1 class="error-headline">Essa página fugiu do circuito<span class="accent-period">.</span></h1>
      <p class="error-sub">Talvez ela nunca existiu, ou talvez ainda não foi construída.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Voltar pro início →</a>
        <a href="https://github.com/casa-do-rodo/skill-claude-code" target="_blank" rel="noopener" class="btn btn-secondary">Ver no GitHub</a>
      </div>
    </div>

  </main>

</body>
</html>
